spring.application.name=mood-paylist-generator



# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/moodify_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=sandaru
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Redis Configuration (optional)
spring.redis.host=localhost
spring.redis.port=6379
spring.cache.type=none

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024ModifyApp
jwt.expiration=86400000


# Logging
logging.level.com.moodify=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Spotify API Credentials
spotify.client.id=${SPOTIFY_CLIENT_ID:}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET:}
spotify.redirect.uri=${SPOTIFY_REDIRECT_URI:http://localhost:8080/api/auth/spotify/callback}